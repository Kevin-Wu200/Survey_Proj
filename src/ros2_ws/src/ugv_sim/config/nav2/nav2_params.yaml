# Nav2 参数配置 - UGV 自主导航
# Smac Hybrid-A* 全局规划器 + Regulated Pure Pursuit 局部规划器
# 代价地图: 分辨率 0.05m, 10m×10m
nav2_params:
  ros__parameters:
    use_sim_time: true
    
    # =========================================================================
    # AMCL 定位 (自适应蒙特卡洛定位)
    # =========================================================================
    amcl:
      ros__parameters:
        alpha1: 0.2
        alpha2: 0.2
        alpha3: 0.2
        alpha4: 0.2
        base_frame_id: "ugv_base_link"
        beam_skip_distance: 0.5
        beam_skip_error_threshold: 0.9
        beam_skip_threshold: 0.3
        do_beamskip: false
        global_frame_id: "map"
        lambda_short: 0.1
        laser_likelihood_max_dist: 2.0
        laser_max_range: 30.0
        laser_min_range: 0.1
        laser_model_type: "likelihood_field"
        max_beams: 60
        max_particles: 2000
        min_particles: 500
        odom_frame_id: "ugv_odom"
        pf_err: 0.05
        pf_z: 0.99
        recovery_alpha_fast: 0.0
        recovery_alpha_slow: 0.0
        resample_interval: 1
        robot_model_type: "differential"
        save_pose_rate: 0.5
        sigma_hit: 0.2
        tf_broadcast: true
        transform_tolerance: 1.0
        update_min_a: 0.2
        update_min_d: 0.25
        z_hit: 0.5
        z_max: 0.05
        z_rand: 0.5
        z_short: 0.05
    
    # =========================================================================
    # 全局代价地图
    # =========================================================================
    global_costmap:
      ros__parameters:
        update_frequency: 1.0
        publish_frequency: 1.0
        global_frame: "map"
        robot_base_frame: "ugv_base_link"
        robot_radius: 0.4
        resolution: 0.05          # 代价地图分辨率 (m)
        width: 200                 # 像素宽度 → 10m / 0.05m = 200
        height: 200                # 像素高度 → 10m / 0.05m = 200
        track_unknown_space: false
        plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
        static_layer:
          plugin: "nav2_costmap_2d::StaticLayer"
          map_subscribe_transient_local: true
        obstacle_layer:
          plugin: "nav2_costmap_2d::ObstacleLayer"
          enabled: true
          observation_sources: "lidar"
          lidar:
            topic: "/ugv/lidar/points"
            max_obstacle_height: 2.0
            clearing: true
            marking: true
            data_type: "PointCloud2"
            min_obstacle_range: 0.3
            max_obstacle_range: 30.0
        inflation_layer:
          plugin: "nav2_costmap_2d::InflationLayer"
          cost_scaling_factor: 5.0
          inflation_radius: 1.0
    
    # =========================================================================
    # 局部代价地图
    # =========================================================================
    local_costmap:
      ros__parameters:
        update_frequency: 5.0
        publish_frequency: 2.0
        global_frame: "ugv_odom"
        robot_base_frame: "ugv_base_link"
        robot_radius: 0.4
        resolution: 0.05
        width: 200                   # 10m × 10m
        height: 200
        rolling_window: true         # 以机器人为中心滚动窗口
        plugins: ["obstacle_layer", "inflation_layer"]
        obstacle_layer:
          plugin: "nav2_costmap_2d::ObstacleLayer"
          enabled: true
          observation_sources: "lidar"
          lidar:
            topic: "/ugv/lidar/points"
            max_obstacle_height: 2.0
            clearing: true
            marking: true
            data_type: "PointCloud2"
        inflation_layer:
          plugin: "nav2_costmap_2d::InflationLayer"
          cost_scaling_factor: 5.0
          inflation_radius: 1.0
    
    # =========================================================================
    # 全局规划器 - Smac Hybrid-A*
    # =========================================================================
    global_planner:
      ros__parameters:
        plugin: "nav2_smac_planner/SmacPlannerHybrid"
        tolerance: 0.5              # 目标容忍度 (m)
        node_hybrid: true
        downsampling_factor: 2      # 降采样因子
        angle_quantization_bins: 72 # 角度量化 (5° 步长)
        analytic_expansion_ratio: 3.5
        analytic_expansion_max_length: 3.0
        minimum_turning_radius: 0.5 # 最小转弯半径 (差速底盘)
        reverse_penalty: 2.0
        change_penalty: 0.5
        non_straight_penalty: 1.2
        cost_penalty: 2.0
        retrospective_penalty: 0.015
        lookup_table_size: 20.0
        cache_obstacle_heuristic: true
        allow_unknown: false
        max_iterations: 1000
        max_on_approach_iterations: 500
        max_planning_time: 3.5      # 最大规划时间 (s)
        smooth_path: true
        motion_model_for_search: "REEDS_SHEPP"
    
    # =========================================================================
    # 局部规划器 - Regulated Pure Pursuit
    # =========================================================================
    local_planner:
      ros__parameters:
        plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
        desired_linear_vel: 2.0     # 期望线速度 (m/s)
        lookahead_dist: 0.6          # 前瞻距离 (m)
        min_lookahead_dist: 0.3
        max_lookahead_dist: 1.5
        lookahead_time: 1.5
        rotate_to_heading_angular_vel: 1.8
        transform_tolerance: 0.1
        use_velocity_scaled_lookahead_dist: true  # 速度自适应前瞻
        min_approach_linear_vel: 0.1
        approach_vel_scaling_dist: 1.0
        max_allowed_time_to_collision_up_to_carrot: 1.0
        use_regulated_linear_velocity_scaling: true
        use_cost_regulated_linear_velocity_scaling: false
        regulated_linear_scaling_min_radius: 0.5
        regulated_linear_scaling_min_speed: 0.25
        use_rotate_to_heading: true
        rotate_to_heading_min_angle: 0.785
        max_angular_accel: 3.2
        max_robot_pose_search_dist: 10.0
        use_interpolation: true
        use_collision_detection: true
    
    # =========================================================================
    # 行为树
    # =========================================================================
    behavior_tree:
      ros__parameters:
        bt_xml_filename: ""
        plugin_lib_names: [
          "nav2_compute_path_to_pose_action_bt_node",
          "nav2_compute_path_through_poses_action_bt_node",
          "nav2_smooth_path_action_bt_node",
          "nav2_follow_path_action_bt_node",
          "nav2_spin_action_bt_node",
          "nav2_wait_action_bt_node",
          "nav2_assisted_teleop_action_bt_node",
          "nav2_back_up_action_bt_node",
          "nav2_drive_on_heading_bt_node",
          "nav2_clear_costmap_service_bt_node",
          "nav2_is_stuck_condition_bt_node",
          "nav2_goal_reached_condition_bt_node",
          "nav2_goal_updated_condition_bt_node",
          "nav2_globally_updated_goal_condition_bt_node",
          "nav2_is_path_valid_condition_bt_node",
          "nav2_initial_pose_received_condition_bt_node",
          "nav2_reinitialize_global_localization_service_bt_node",
          "nav2_rate_controller_bt_node",
          "nav2_distance_controller_bt_node",
          "nav2_speed_controller_bt_node",
          "nav2_truncate_path_action_bt_node",
          "nav2_truncate_path_local_action_bt_node",
          "nav2_goal_updater_node_bt_node",
          "nav2_recovery_node_bt_node",
          "nav2_pipeline_sequence_bt_node",
          "nav2_round_robin_node_bt_node",
          "nav2_transform_available_condition_bt_node",
          "nav2_time_expired_condition_bt_node",
          "nav2_path_expiring_timer_condition",
          "nav2_distance_traveled_condition_bt_node",
          "nav2_single_trigger_bt_node",
          "nav2_goal_updated_controller_bt_node",
          "nav2_is_battery_low_condition_bt_node",
          "nav2_navigate_through_poses_action_bt_node",
          "nav2_navigate_to_pose_action_bt_node",
          "nav2_remove_passed_goals_action_bt_node",
          "nav2_planner_selector_bt_node",
          "nav2_controller_selector_bt_node",
          "nav2_goal_checker_selector_bt_node",
          "nav2_controller_cancel_bt_node",
          "nav2_path_longer_on_approach_bt_node",
          "nav2_wait_cancel_bt_node",
          "nav2_spin_cancel_bt_node",
          "nav2_back_up_cancel_bt_node",
          "nav2_assisted_teleop_cancel_bt_node",
          "nav2_drive_on_heading_cancel_bt_node",
          "nav2_is_battery_charging_condition_bt_node",
        ]
    
    # =========================================================================
    # 行为树导航到目标节点
    # =========================================================================
    navigate_to_pose:
      ros__parameters:
        plugin: "nav2_bt_navigator/NavigateToPoseNavigator"
    
    # =========================================================================
    # 速度平滑器
    # =========================================================================
    velocity_smoother:
      ros__parameters:
        max_velocity: [2.0, 0.0, 1.5]
        min_velocity: [-2.0, 0.0, -1.5]
        max_accel: [1.5, 0.0, 2.0]
        max_decel: [-1.5, 0.0, -2.0]
        odom_topic: "/ugv/odom"
